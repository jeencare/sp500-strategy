name: 📊 每日自动更新

on:
    schedule:
    # 每天 UTC 时间 0:00 运行（北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码(含历史数据)
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🚀 运行策略更新
        env:
          CI: 'true'
        run: python sp500_strategy.py

      - name: 📤 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          timestamp=$(date -u +'%Y-%m-%d %H:%M UTC')
          git diff --staged --quiet || git commit -m "📊 数据更新 ${timestamp}"
          git push
